
#user  nobody;
worker_processes 1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;
error_log  logs/error.log debug;

#pid        logs/nginx.pid;
events {
    worker_connections 1024;
}


http {
    server {
        listen 80;
        server_name www.nantingya.top;
        location / {
            proxy_pass http://127.0.0.1:1313/;
        }
        # return 301 https://www.nantingya.top;
    }
    # HTTPS server
    #
    server {
        listen 443 ssl;
        server_name www.nantingya.top;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_certificate /usr/local/nginx/ssl/www.nantingya.top.rsa.pem;
        ssl_certificate_key /usr/local/nginx/ssl/www.nantingya.top.rsa.key;

        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        ssl_prefer_server_ciphers on;


        location = /index.html {
            proxy_pass http://127.0.0.1:1313/;
        }

        location / {
            proxy_pass http://127.0.0.1:1313/;

            proxy_intercept_errors on;
            error_page 404 =200 /index.html;
        }


    }
    server {
        listen 7777 ssl;
        server_name www.nantingya.top;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        ssl_certificate /usr/local/nginx/ssl/www.nantingya.top.rsa.pem;
        ssl_certificate_key /usr/local/nginx/ssl/www.nantingya.top.rsa.key;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://127.0.0.1:1014;
        }
    }

    # 后端
    server {
        listen 25001 ssl;
        server_name www.nantingya.top;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        ssl_certificate /usr/local/nginx/ssl/www.nantingya.top.rsa.pem;
        ssl_certificate_key /usr/local/nginx/ssl/www.nantingya.top.rsa.key;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://127.0.0.1:6999/;
        }
    }
}